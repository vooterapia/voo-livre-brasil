<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Voo Livre Brasil V2</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#78bce8;font-family:system-ui;touch-action:none}canvas{display:block;width:100%;height:100%}#hud{position:fixed;top:10px;left:10px;right:10px;display:grid;grid-template-columns:1fr 1fr;color:#fff;font-weight:900;text-shadow:0 2px 5px #000}#hud span:nth-child(even){text-align:right}.b{position:fixed;bottom:18px;width:92px;height:112px;border:1px solid #fff5;border-radius:32px;background:#07111b66;display:flex;align-items:center;justify-content:center;font-size:44px}.b.a{background:#fff4;transform:scale(.96)}#L{left:16px}#R{right:16px}#start{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0002}.card{background:#ffffffe9;padding:20px;border-radius:20px;text-align:center;max-width:330px}#state{position:fixed;left:50%;top:62px;transform:translateX(-50%);font-weight:900;color:#fff;text-shadow:0 2px 5px #000;font-size:18px}</style></head>
<body><canvas id="g"></canvas><div id="hud"><span id="alt">ALT 2350 m</span><span id="vario">VAR -1.0 m/s</span><span id="spd">VEL 40 km/h</span><span id="wind">VENTO 14 km/h ↗</span></div><div id="state"></div><div class="b" id="L">🤚</div><div class="b" id="R">✋</div><div id="start"><div class="card"><h2>🪂 Voo Livre Brasil</h2><p><b>Base Visual V2</b></p><p>Rio redesenhado, subida/descida visível e piloto com selete tipo pod.</p><p>Toque para decolar.</p></div></div>
<script>
const c=document.getElementById('g'),x=c.getContext('2d');let W,H,D,last=0,run=0,t=0,K={l:0,r:0},P={x:0,z:0,h:0,b:0,alt:2350,v:-1.05,s:40,va:2350};
const T=[{x:0,z:155,r:115,p:5.8},{x:-150,z:500,r:140,p:6},{x:210,z:900,r:150,p:6.4}];
function rs(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();
function bind(id,k){let e=document.getElementById(id);e.onpointerdown=a=>{a.preventDefault();K[k]=1;e.classList.add('a')};e.onpointerup=e.onpointercancel=a=>{a.preventDefault();K[k]=0;e.classList.remove('a')}}bind('L','l');bind('R','r');function iniciarVoo(e){
      if(e){ e.preventDefault(); e.stopPropagation(); }
      run=1;
      document.getElementById('start').style.display='none';
    }
    const startBox=document.getElementById('start');
    startBox.addEventListener('click', iniciarVoo, {passive:false});
    startBox.addEventListener('touchend', iniciarVoo, {passive:false});
    startBox.addEventListener('pointerup', iniciarVoo, {passive:false});
function ridge(y,a,f,o,col){x.fillStyle=col;x.beginPath();x.moveTo(0,H);for(let s=0;s<=W;s+=7)x.lineTo(s,y+Math.sin(s*f+o)*a+Math.sin(s*f*2.7+o*.6)*a*.32);x.lineTo(W,H);x.fill()}
function rc(y,h,b){let n=(y-h)/(b-h);return W*.51+Math.sin(n*8.2+P.z*.016)*W*(.035+n*.08)+Math.sin(n*17+P.h*3)*W*.012}
function river(h){let b=H+40;x.beginPath();for(let y=h;y<=b;y+=8){let n=(y-h)/(b-h),w=5+n*n*50,c=rc(y,h,b);y===h?x.moveTo(c-w-8,y):x.lineTo(c-w-8,y)}for(let y=b;y>=h;y-=8){let n=(y-h)/(b-h),w=5+n*n*50,c=rc(y,h,b);x.lineTo(c+w+8,y)}x.closePath();x.fillStyle='#776a4c';x.fill();x.beginPath();for(let y=h;y<=b;y+=8){let n=(y-h)/(b-h),w=4+n*n*42,c=rc(y,h,b);y===h?x.moveTo(c-w,y):x.lineTo(c-w,y)}for(let y=b;y>=h;y-=8){let n=(y-h)/(b-h),w=4+n*n*42,c=rc(y,h,b);x.lineTo(c+w,y)}x.closePath();let gr=x.createLinearGradient(0,h,0,b);gr.addColorStop(0,'#91cada');gr.addColorStop(.55,'#4c9fbd');gr.addColorStop(1,'#2d7398');x.fillStyle=gr;x.fill();x.strokeStyle='#fff7';x.lineWidth=1.4;for(let i=2;i<9;i++){let y=h+i*(b-h)/10,n=(y-h)/(b-h),c=rc(y,h,b),w=3+n*n*32;x.beginPath();x.moveTo(c-w*.6,y);x.lineTo(c+w*.45,y-1);x.stroke()}}
function world(){let d=P.va-2350,h=H*.39+Math.max(-90,Math.min(85,-d*.16)),gs=h+H*.2,o=P.h*95,sky=x.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#3d92cf');sky.addColorStop(.52,'#abd7ec');sky.addColorStop(1,'#eaf2ec');x.fillStyle=sky;x.fillRect(0,0,W,H);ridge(h-80,18,.007,o*.001,'#c4d0d4');ridge(h-42,31,.009,o*.002,'#9eadb0');ridge(h+18,55,.008,o*.004,'#758d7f');ridge(h+78,86,.011,o*.007,'#4a7054');ridge(h+145,116,.014,o*.011,'#31593b');x.fillStyle='#3f733f';x.fillRect(0,gs,W,H-gs);let gap=Math.max(20,32-d*.006);for(let n=0;n<13;n++){let y=gs+n*gap,s=44+n*27;x.fillStyle=n%3===0?'#90b764':n%3===1?'#6d9b54':'#b2b46c';x.beginPath();x.moveTo(W/2-s,y);x.lineTo(W/2+s,y);x.lineTo(W/2+s+45,y+gap*.9);x.lineTo(W/2-s-45,y+gap*.9);x.fill()}river(h+62)}
function glider(){x.save();x.translate(W/2,H*.49+Math.max(-16,Math.min(16,-P.v*2.8)));x.rotate(P.b*.34);x.strokeStyle='#2228';x.lineWidth=1;for(let n=-8;n<=8;n++){let tx=n*16,ty=-68-Math.cos(n/8*Math.PI/2)*52;x.beginPath();x.moveTo(tx,ty);x.lineTo(n*3.8,65);x.stroke()}x.fillStyle='#8f2025';x.beginPath();x.moveTo(-154,-65);x.quadraticCurveTo(0,-178,154,-65);x.quadraticCurveTo(82,-87,0,-94);x.quadraticCurveTo(-82,-87,-154,-65);x.fill();let gr=x.createLinearGradient(-160,-120,160,-55);gr.addColorStop(0,'#d22f2d');gr.addColorStop(.2,'#f4f1ea');gr.addColorStop(.4,'#1f56b5');gr.addColorStop(.6,'#1f56b5');gr.addColorStop(.8,'#f4f1ea');gr.addColorStop(1,'#d22f2d');x.fillStyle=gr;x.beginPath();x.moveTo(-158,-68);x.quadraticCurveTo(0,-184,158,-68);x.quadraticCurveTo(86,-95,0,-100);x.quadraticCurveTo(-86,-95,-158,-68);x.fill();x.fillStyle='#20262a';x.beginPath();x.arc(0,48,9,0,7);x.fill();x.fillRect(-10,58,20,30);let pod=x.createLinearGradient(0,86,0,138);pod.addColorStop(0,'#7c2626');pod.addColorStop(1,'#2b1a1a');x.fillStyle=pod;x.beginPath();x.moveTo(-16,80);x.quadraticCurveTo(-24,98,-13,124);x.quadraticCurveTo(0,146,13,124);x.quadraticCurveTo(24,98,16,80);x.quadraticCurveTo(0,89,-16,80);x.fill();x.strokeStyle='#20262a';x.lineWidth=6;x.beginPath();x.moveTo(-8,65);x.lineTo(-29,53);x.moveTo(8,65);x.lineTo(29,53);x.stroke();x.fillStyle='#b77d5f';x.beginPath();x.arc(-29,53,4.5,0,7);x.arc(29,53,4.5,0,7);x.fill();x.restore()}
function upd(dt){if(!run)return;t+=dt;if(K.l&&!K.r)P.b-=.00155*dt;if(K.r&&!K.l)P.b+=.00155*dt;if(!K.l&&!K.r)P.b*=.92;P.b=Math.max(-.72,Math.min(.72,P.b));P.h+=P.b*.00105*dt;P.s=40-7*((K.l+K.r)*.5);let m=P.s/3.6*dt/1000;P.x+=Math.sin(P.h)*m;P.z+=Math.cos(P.h)*m;let lift=0,inside=0;for(let q of T){let d=Math.hypot(P.x-q.x,P.z-q.z);if(d<q.r){let f=1-d/q.r;lift=Math.max(lift,q.p*(.45+.55*f));inside=1}}P.v=-1.05+lift;P.alt+=P.v*dt/1000;P.va+=P.v*dt/1000*18;alt.textContent='ALT '+Math.round(P.alt)+' m';document.getElementById('vario').textContent=(P.v>0?'🔥 SUBINDO ':'VAR ')+(P.v>=0?'+':'')+P.v.toFixed(1)+' m/s';spd.textContent='VEL '+Math.round(P.s)+' km/h';wind.textContent=inside?'🌀 TÉRMICA — GIRE!':'VENTO 14 km/h ↗';state.textContent=P.v>.5?'↑ GANHANDO ALTURA':P.v<-.4?'↓ PERDENDO ALTURA':''}
function loop(n){requestAnimationFrame(loop);let dt=Math.min(32,n-(last||n));last=n;upd(dt);world();glider()}requestAnimationFrame(loop);
</script></body></html>
